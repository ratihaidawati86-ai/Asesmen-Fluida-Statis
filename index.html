<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen Fluida Statis - Mode Timer</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); position: relative; }
        
        /* Sticky Timer Style */
        #timer-container { 
            position: sticky; top: 0; background: white; padding: 10px; 
            border-bottom: 3px solid var(--primary); z-index: 100; 
            text-align: center; font-weight: bold; font-size: 1.2rem; color: var(--danger);
        }

        .question-card { border-bottom: 1px solid #e2e8f0; padding: 20px 0; }
        .option { display: block; margin: 8px 0; cursor: pointer; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; transition: 0.2s; }
        .option:hover { background: #f8fafc; border-color: var(--primary); }
        .hots { color: #f59e0b; font-weight: bold; font-size: 0.8rem; border: 1px solid #f59e0b; padding: 2px 5px; border-radius: 4px; margin-right: 5px; }
        #result-area { display: none; margin-top: 30px; padding: 20px; border-radius: 8px; background: #f0f9ff; border: 2px solid var(--primary); }
        .btn-submit { width: 100%; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }
        .feedback-text { margin-top: 10px; font-size: 0.9rem; display: none; padding: 10px; border-radius: 5px; }
        .correct { background: #dcfce7; color: #166534; }
        .wrong { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer-container">Sisa Waktu: <span id="time">05:00</span></div>
    
    <h1>Asesmen Fluida Statis</h1>
    <p style="text-align:center">Waktu Anda terbatas! Segera selesaikan dan lihat analisis kemampuanmu.</p>
    
    <div id="quiz-content"></div>
    
    <button id="btn-kirim" class="btn-submit" onclick="kalkulasiHasil()">Kirim Jawaban & Lihat Analisis</button>

    <div id="result-area">
        <h2 id="score-display"></h2>
        <div id="personal-analysis"></div>
        <button class="btn-submit" style="background:#64748b" onclick="window.location.reload()">Ulangi Kuis</button>
    </div>
</div>

<script>
    const dataSoal = [
        { q: "Mengapa penyelam merasa sakit telinga di kedalaman?", options: ["Tekanan udara besar", "Tekanan hidrostatis naik sesuai kedalaman", "Gaya apung hilang"], correct: 1, topic: "Tekanan Hidrostatis" },
        { q: "Prinsip kerja rem hidrolik adalah...", options: ["Hukum Archimedes", "Hukum Pascal", "Tegangan Permukaan"], correct: 1, topic: "Hukum Pascal" },
        { q: "<span class='hots'>HOTS</span> Kapal laut yang berat bisa terapung karena...", options: ["Massa jenis besi < air", "Volume air yang dipindahkan sangat besar", "Besi tidak punya berat"], correct: 1, topic: "Hukum Archimedes" },
        { q: "Tekanan hidrostatis pada kedalaman 2m (ρ=1000, g=10) adalah...", options: ["200 Pa", "20.000 Pa", "2.000 Pa"], correct: 1, topic: "Perhitungan Hidrostatis" },
        { q: "<span class='hots'>HOTS</span> Balon udara naik karena...", options: ["Udara panas lebih ringan", "Ditiup angin", "Tekanan udara nol"], correct: 0, topic: "Hukum Archimedes" },
        { q: "<span class='hots'>HOTS</span> Telur melayang di air garam karena...", options: ["Berat telur berkurang", "Massa jenis fluida bertambah", "Telur jadi ringan"], correct: 1, topic: "Hukum Archimedes" },
        { q: "Kapal selam mengatur posisi dengan...", options: ["Mengubah bentuk", "Mengisi/membuang air di tangki", "Menambah kecepatan"], correct: 1, topic: "Aplikasi Fluida Statis" },
        { q: "Air memanjat pipa kapiler (meniskus cekung) karena...", options: ["Adhesi > Kohesi", "Kohesi > Adhesi", "Gaya Gravitasi"], correct: 0, topic: "Kapilaritas" },
        { q: "<span class='hots'>HOTS</span> Serangga berjalan di air karena...", options: ["Massa jenis serangga kecil", "Tegangan permukaan air", "Serangga punya sayap"], correct: 1, topic: "Tegangan Permukaan" },
        { q: "Alat hidrolik A1=5cm², A2=100cm², F1=10N. Maka F2...", options: ["200 N", "100 N", "50 N"], correct: 0, topic: "Perhitungan Hukum Pascal" }
    ];

    // Setup Timer (5 menit = 300 detik)
    let waktuSisa = 300;
    const timerDisplay = document.getElementById('time');
    
    const intervalTimer = setInterval(() => {
        let menit = Math.floor(waktuSisa / 60);
        let detik = waktuSisa % 60;
        detik = detik < 10 ? '0' + detik : detik;
        timerDisplay.innerHTML = `${menit}:${detik}`;
        
        if (waktuSisa <= 0) {
            clearInterval(intervalTimer);
            alert("Waktu Habis! Jawaban Anda akan otomatis terkirim.");
            kalkulasiHasil();
        }
        waktuSisa--;
    }, 1000);

    // Render Soal
    const quizContent = document.getElementById('quiz-content');
    dataSoal.forEach((item, index) => {
        let optionsHtml = item.options.map((opt, i) => 
            `<label class="option"><input type="radio" name="soal${index}" value="${i}"> ${opt}</label>`
        ).join('');
        
        quizContent.innerHTML += `
            <div class="question-card">
                <p><b>${index + 1}.</b> ${item.q}</p>
                ${optionsHtml}
                <div id="fb${index}" class="feedback-text"></div>
            </div>
        `;
    });

    function kalkulasiHasil() {
        clearInterval(intervalTimer); // Stop timer
        document.getElementById('btn-kirim').disabled = true;
        document.getElementById('timer-container').innerHTML = "WAKTU SELESAI";

        let skor = 0;
        let materiLemah = [];
        let materiKuat = [];

        dataSoal.forEach((item, index) => {
            const pilihan = document.querySelector(`input[name="soal${index}"]:checked`);
            const fbBox = document.getElementById(`fb${index}`);
            fbBox.style.display = "block";

            // Kunci semua radio button agar tidak bisa diubah setelah submit
            const inputs = document.getElementsByName(`soal${index}`);
            inputs.forEach(input => input.disabled = true);

            if (pilihan && parseInt(pilihan.value) === item.correct) {
                skor++;
                fbBox.innerHTML = "✅ Benar!";
                fbBox.className = "feedback-text correct";
                if (!materiKuat.includes(item.topic)) materiKuat.push(item.topic);
            } else {
                fbBox.innerHTML = `❌ Kurang tepat. Topik: ${item.topic}.`;
                fbBox.className = "feedback-text wrong";
                if (!materiLemah.includes(item.topic)) materiLemah.push(item.topic);
            }
        });

        document.getElementById('result-area').style.display = "block";
        document.getElementById('score-display').innerHTML = `Skor Akhir: ${skor} / ${dataSoal.length}`;
        
        let analisisHtml = `<h3>Analisis Hasil:</h3>`;
        if (materiLemah.length > 0) {
            analisisHtml += `<p>💡 <b>Materi yang perlu ditingkatkan:</b> <br> ${materiLemah.join(', ')}.</p>`;
        }
        if (materiKuat.length > 0) {
            analisisHtml += `<p>🌟 <b>Materi yang sudah kamu kuasai:</b> <br> ${materiKuat.join(', ')}.</p>`;
        }
        
        document.getElementById('personal-analysis').innerHTML = analisisHtml;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
